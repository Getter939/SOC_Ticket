# Production stack: nginx -> gunicorn (the Dockerfile's default CMD) -> Django,
# with PostgreSQL. Unlike docker-compose.yml (dev: runserver + live-reload
# bind mount), this runs the built image as-is: no source bind mount, and only
# nginx (port 80) is published to the host/LAN.
#
# Usage: docker compose -f docker-compose.prod.yml up -d --build

services:

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: always
    env_file:
      - .env
    environment:
      DB_HOST: db
    volumes:
      - staticfiles:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/static:ro
    depends_on:
      - web

volumes:
  postgres_data:
  staticfiles:
