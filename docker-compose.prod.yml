# Production stack: nginx -> gunicorn (the Dockerfile's default CMD) -> Django,
# with PostgreSQL. Unlike docker-compose.yml (dev: runserver + live-reload
# bind mount), this runs the built image as-is: no source bind mount, and only
# nginx (ports 80/443) is published to the host/LAN. TLS certificate paths are
# required so production cannot accidentally start over clear-text HTTP.
#
# Usage: docker compose -f docker-compose.prod.yml up -d --build

services:

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: always
    env_file:
      - .env
    environment:
      DB_HOST: db
      RUN_AS_APPUSER: "true"
      SESSION_COOKIE_SECURE: "True"
      CSRF_COOKIE_SECURE: "True"
      SECURE_SSL_REDIRECT: "True"
      SECURE_HSTS_SECONDS: "31536000"
      PASSWORD_RESET_USE_HTTPS: "True"
      USE_PROXY_SSL_HEADER: "True"
      TRUST_X_FORWARDED_FOR: "True"
      OPENSEARCH_VERIFY_SSL: "True"
      OPENSEARCH_CA_BUNDLE: "/etc/ssl/certs/opensearch-ca.pem"
    volumes:
      - staticfiles:/app/staticfiles
      - media:/app/media
      - ${OPENSEARCH_CA_HOST_PATH:?Set OPENSEARCH_CA_HOST_PATH to the trusted OpenSearch CA PEM}:/etc/ssl/certs/opensearch-ca.pem:ro
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/static:ro
      - ${TLS_CERT_PATH:?Set TLS_CERT_PATH to the host full-chain PEM file}:/etc/nginx/certs/tls.crt:ro
      - ${TLS_KEY_PATH:?Set TLS_KEY_PATH to the host private-key PEM file}:/etc/nginx/certs/tls.key:ro
    depends_on:
      - web

  backup:
    image: postgres:16
    profiles: ["backup"]
    env_file:
      - .env
    environment:
      PGHOST: "db"
      PGPORT: "${DB_PORT:-5432}"
      BACKUP_DIR: "/backups"
      MEDIA_ROOT: "/app/media"
      BACKUP_PREFIX: "${BACKUP_PREFIX:-soc_ticket}"
      BACKUP_TIER: "${BACKUP_TIER:-manual}"
      BACKUP_RETENTION_ENABLED: "${BACKUP_RETENTION_ENABLED:-true}"
      BACKUP_RETENTION_HOURLY_DAYS: "${BACKUP_RETENTION_HOURLY_DAYS:-2}"
      BACKUP_RETENTION_DAILY_DAYS: "${BACKUP_RETENTION_DAILY_DAYS:-30}"
      BACKUP_RETENTION_WEEKLY_DAYS: "${BACKUP_RETENTION_WEEKLY_DAYS:-84}"
      BACKUP_RETENTION_MONTHLY_DAYS: "${BACKUP_RETENTION_MONTHLY_DAYS:-365}"
      BACKUP_ENCRYPTION: "${BACKUP_ENCRYPTION:-openssl}"
      BACKUP_ENCRYPTION_PASSWORD: "${BACKUP_ENCRYPTION_PASSWORD:-}"
      BACKUP_ENCRYPTION_PASSWORD_FILE: "${BACKUP_ENCRYPTION_PASSWORD_FILE:-}"
      BACKUP_GPG_RECIPIENT: "${BACKUP_GPG_RECIPIENT:-}"
      APP_VERSION: "${APP_VERSION:-unknown}"
    volumes:
      - ./scripts/backup:/scripts:ro
      - ${BACKUP_HOST_PATH:-./backups}:/backups
      - media:/app/media:ro
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/scripts/backup.sh"]

  restore_verify:
    image: postgres:16
    profiles: ["backup"]
    env_file:
      - .env
    environment:
      PGHOST: "db"
      PGPORT: "${DB_PORT:-5432}"
      PGMAINTENANCE_DB: "${PGMAINTENANCE_DB:-postgres}"
      RESTORE_DB: "${RESTORE_DB:-ticketdata_restoretest}"
      RESTORE_DROP_AFTER_TEST: "${RESTORE_DROP_AFTER_TEST:-false}"
      BACKUP_FILE: "${BACKUP_FILE:-}"
      BACKUP_ENCRYPTION_PASSWORD: "${BACKUP_ENCRYPTION_PASSWORD:-}"
      BACKUP_ENCRYPTION_PASSWORD_FILE: "${BACKUP_ENCRYPTION_PASSWORD_FILE:-}"
    volumes:
      - ./scripts/backup:/scripts:ro
      - ${BACKUP_HOST_PATH:-./backups}:/backups
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/scripts/restore_verify.sh"]

volumes:
  postgres_data:
  staticfiles:
  media:
