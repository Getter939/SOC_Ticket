# TLS-terminating reverse proxy + static file server for the SOC ticketing app.
# Static files are collected into the shared `staticfiles` volume by the
# web container's startup command (collectstatic) before gunicorn starts.

server {
    listen 80;
    server_name _;

    # Never serve authenticated SOC traffic over clear-text HTTP.
    return 308 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/tls.crt;
    ssl_certificate_key /etc/nginx/certs/tls.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    # Ticket attachments are capped at 25MB in the app (MAX_ATTACHMENT_SIZE);
    # give nginx headroom above that for multipart overhead.
    client_max_body_size 26M;

    location /static/ {
        alias /static/;
        autoindex off;
    }

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Replace, rather than append, untrusted client-provided forwarding
        # headers. Django may use this value for account-abuse controls.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}
