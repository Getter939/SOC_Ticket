# Reverse proxy + static file server for the SOC ticketing app.
# Static files are collected into the shared `staticfiles` volume by the
# web container's startup command (collectstatic) before gunicorn starts.

server {
    listen 80;
    server_name _;

    # SOC tickets can carry file attachments; raise nginx's default 1m limit.
    client_max_body_size 10M;

    location /static/ {
        alias /static/;
    }

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
