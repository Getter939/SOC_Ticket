{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10 col-lg-11">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-primary text-white py-3">
                <h5 class="mb-0"><i class="bi bi-plus-circle-fill me-2"></i>แจ้งเหตุเสีย</h5>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {% if triage_id %}
                    <input type="hidden" name="triage_id" value="{{ triage_id }}">
                    {% endif %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary px-4">บันทึกและออกเลข Ticket</button>
                        <a href="{% url 'home' %}" class="btn btn-light px-4 border ms-2">ยกเลิก</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
