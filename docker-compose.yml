services:

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ticketdata
      POSTGRES_USER: ticket
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"          # expose so pgAdmin can connect if needed
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticket -d ticketdata"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app                # live reload: code changes reflect instantly
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: db             # override .env so it points to the Docker db service
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
